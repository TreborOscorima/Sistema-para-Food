version: "3.9"
# =============================================================================
# docker-compose.test.yml — Override para SVR de Prueba en AWS (sin dominio)
#
# Uso:
#   TEST_IP=<IP-EC2> docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
#
# Acceso desde el navegador:
#   TUWAYKIFOOD : http://<TEST_IP>:3003
#
# Prerrequisitos en AWS:
#   - Security Group EC2: puerto TCP 3003 abierto
#   - .env con DB_PASSWORD, MYSQL_ROOT_PASSWORD, AUTH_SECRET_KEY definidos
#   - git clone del repo en ~/sist-food
# =============================================================================

services:
  food_mysql:
    environment:
      MYSQL_USER: food
      MYSQL_PASSWORD: ${DB_PASSWORD}

  tuwayki_food:
    environment:
      PUBLIC_API_URL: "http://${TEST_IP:-localhost}:3003"
      ENV: prod
      DB_HOST: food_mysql
      DB_USER: food
