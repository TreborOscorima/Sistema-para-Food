version: "3.9"

# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
services:
  tuwayki_food:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - ENV=dev
    volumes:
      - .:/app
      - food_web:/app/.web
    networks:
      - default

volumes:
  food_web:
