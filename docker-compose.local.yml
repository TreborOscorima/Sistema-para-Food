version: "3.9"
# =============================================================================
# docker-compose.local.yml — Override para testing local (Windows/Mac/Linux)
#
# Uso:
#   docker build -t tuwayki_food:latest .
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Acceso:
#   TUWAYKIFOOD : http://localhost:3003
#
# Mínimo en .env: DB_PASSWORD, MYSQL_ROOT_PASSWORD
# =============================================================================

services:
  food_mysql:
    environment:
      MYSQL_USER: food
      MYSQL_PASSWORD: ${DB_PASSWORD}

  tuwayki_food:
    environment:
      PUBLIC_API_URL: "http://localhost:3003"
      ENV: prod
      DB_HOST: food_mysql
      DB_USER: food
