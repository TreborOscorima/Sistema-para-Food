# =============================================================================
# ops/nginx/food-tuwayki.conf — TUWAYKIFOOD (food.tuwayki.com)
#
# Proxy a Reflex corriendo en Docker (container tuwayki_food, port 3003).
# WebSocket requerido para Reflex state sync.
#
# Instalación:
#   sudo cp ops/nginx/food-tuwayki.conf /etc/nginx/sites-available/food-tuwayki
#   sudo ln -s /etc/nginx/sites-available/food-tuwayki /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream tuwayki_food {
    server 127.0.0.1:3003;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name food.tuwayki.com;

    # Redirigir HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name food.tuwayki.com;

    # SSL — reemplazar con rutas del certificado real (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/food.tuwayki.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/food.tuwayki.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cabeceras de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Timeouts para Reflex (WebSocket de larga duración)
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout   10s;

    # WebSocket (Reflex state sync)
    location /_event/ {
        proxy_pass         http://tuwayki_food;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets compilados — cachear agresivamente (Reflex usa hash en filename)
    location /assets/ {
        proxy_pass         http://tuwayki_food;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Todo lo demás
    location / {
        proxy_pass         http://tuwayki_food;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check interno (sin logs para no saturar)
    location /api/ping {
        proxy_pass         http://tuwayki_food;
        access_log off;
    }

    # Límite de tamaño para uploads de imágenes de platos
    client_max_body_size 10M;
}
